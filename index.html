<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>老子臭丝袜飞行棋</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
<style>
    /* ✅ 1. 基础兜底样式（防止 Tailwind 加载失败导致全黑或全乱） */
    :root {
      --neon-pink: #ff0080;
      --main-green: #bef264;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #0d000d; /* 纯黑底色兜底 */
      color: var(--main-green);
      font-family: 'Courier New', monospace, "Microsoft YaHei";
      overflow-x: hidden;
    }

    /* ✅ 2. 半透明背景层 (使用 ::before 避免影响文字) */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      /* 如果你没有 bg.jpg，它会显示深紫色 */
      background: #1a001a url('assets/images/bg.jpg') no-repeat center center;
      background-size: cover;
      opacity: 0.5; /* 调整这里的数值控制背景透明度 */
      z-index: -1;
    }

    /* ✅ 3. 核心布局补丁 */
    .hidden { display: none !important; } /* 强制隐藏，不依赖外部库 */

    #bgm-header {
      position: fixed; top: 15px; right: 15px; z-index: 9999;
    }
    #bgm-ctrl {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid var(--neon-pink);
      color: var(--neon-pink);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      box-shadow: 0 0 10px var(--neon-pink);
    }

    .main-layout {
      margin-top: 60px;
      padding: 0 15px 40px 15px;
      position: relative;
      z-index: 10;
    }

    .neon-pink { text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink); }
    
    #connPanel, #gameArea > div, #log {
      background-color: rgba(0, 0, 0, 0.7) !important;
      border: 2px solid #db2777 !important;
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
    }

    #board-container { 
      position: relative; width: 100%; max-width: 500px; aspect-ratio: 1 / 1; 
      margin: 0 auto; border: 4px solid #db2777;
      box-shadow: 0 0 20px var(--neon-pink); background: rgba(0,0,0,0.4);
    }
    #board { width: 100%; height: 100%; display: block; }
    
    /* 螺旋遮罩效果 */
    #board-gif-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: url('assets/images/mask.gif') center/cover no-repeat;
      opacity: 0.3; pointer-events: none; z-index: 5;
    }

    .btn-xl { padding: 1rem; font-size: 1.25rem; font-weight: 900; border-radius: 1rem; cursor: pointer; transition: 0.3s; }
    .btn-xl:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="bgm-header">
  <div id="bgm-ctrl" onclick="toggleBGM()">🎵 BGM: OFF</div>
</div>

<audio id="snd-bgm" src="assets/audio/bgm.mp3" loop preload="auto"></audio>
<audio id="snd-dice" src="assets/audio/dice.mp3" preload="auto"></audio>
<audio id="snd-task" src="assets/audio/task.mp3" preload="auto"></audio>

<div class="max-w-4xl mx-auto game-main-container">  
  <div class="text-center mb-8">
    <h1 class="text-4xl font-black text-pink-600 neon-pink">恶堕臭丝袜洗脑棋</h1>
    <p class="text-pink-400 mt-2 italic">成为主人的丝袜狗</p>
  </div>

  <div id="connPanel" class="bg-black/80 border-4 border-pink-600 p-6 rounded-3xl mb-6 shadow-2xl">
    <div class="flex flex-col gap-4">
      <button onclick="createRoom()" class="btn-xl bg-pink-600 text-white w-full">创建房间（成为丝袜奴隶）</button>
      <div class="flex flex-col gap-2">
        <input id="joinID" placeholder="输入房号加入调教" class="bg-zinc-900 border-4 border-pink-500 px-6 py-3 text-xl rounded-2xl text-white text-center outline-none">
        <button onclick="joinRoom()" class="btn-xl bg-pink-500 text-black w-full">加入（成为丝袜贱畜）</button>
      </div>
    </div>
  </div>

  <div id="gameArea" class="hidden space-y-4">
    <div class="bg-pink-900/40 border-2 border-pink-500 p-2 rounded-2xl text-center">
      <span class="text-pink-300 text-sm">当前调教房号：</span>
      <span id="currentIDLabel" class="text-2xl font-mono font-black text-white"></span>
    </div>

    <div id="board-container">
      <canvas id="board"></canvas>
      <div id="board-gif-overlay"></div>
    </div>

    <div id="info" class="bg-black/80 border-4 border-pink-500 p-4 rounded-2xl text-center text-xl font-black">等待同步...</div>
    
    <div class="flex gap-2">
      <button onclick="rollDice()" id="rollBtn" class="flex-[2] bg-pink-600 text-white text-2xl font-black py-4 rounded-2xl shadow-lg active:scale-95 disabled:opacity-50">恶堕吧</button>
      <button onclick="resetGame()" class="flex-1 bg-zinc-800 text-white rounded-2xl text-sm">清空大脑</button>
    </div>

    <div id="log" class="bg-black/90 border-2 border-pink-900 p-4 rounded-xl h-40 overflow-y-auto font-mono text-sm text-pink-300"></div>
  </div>
</div>

<div id="task" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
  <div class="bg-zinc-950 border-[10px] border-pink-600 w-full max-w-2xl rounded-[40px] p-8 text-center shadow-[0_0_100px_#ff0080]">
    <div id="task-text" class="text-xl leading-relaxed text-pink-100 mb-8 font-bold"></div>
    <button onclick="closeTask()" class="w-full bg-pink-600 text-white text-xl font-black py-4 rounded-2xl">遵命，主人</button>
  </div>
</div>

<script>
  // ✅ 请确保此处的 Firebase 配置正确
  const firebaseConfig = {
    apiKey: "AIzaSyCzuqADikKXCOKtQXoiVkGRjPiceY-HVDk",
    authDomain: "swsgfxq-game.firebaseapp.com",
    databaseURL: "https://swsgfxq-game-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "swsgfxq-game",
    storageBucket: "swsgfxq-game.firebasestorage.app",
    messagingSenderId: "591308485557",
    appId: "1:591308485557:web:045018427b5e90076f9ffc"
  };

  // 容错初始化
  let db = null;
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    db = firebase.database();
  } catch (e) {
    console.error("Firebase 加载失败，请检查网络:", e);
    alert("无法连接服务器，请检查是否被墙或配置错误。");
  }

  // 恢复原始 V5 任务文字
  const tasks = {
    1: "双膝跪地，向丝袜主人磕头", 2:"向主人磕头自抽耳光 5 下", 3: "抚摸敏感区深呼吸丝袜味道 30 秒让味道侵入你的大脑", 
    4: "原地转圈 10 次并叫：我是丝袜贱狗", 5: "用舌头清理丝袜上的褶皱", 6: "后退 2 格并将鼻勾和口撑戴上（5分钟后可选择摘下）",
    7: "双手比耶喊我是贱狗，前进 3 格", 8: "保持跪姿翻白眼伸舌头直到下一回合", 9: "捏着乳头亲吻丝袜 10 次让丝袜代替你思考", 
    10: "主人踩在脸上 1 分钟喊我是主人得臭鞋垫", 11: "左右手扇自己 10 下", 12: "闻一分钟臭丝袜让气息包裹着你的脑子", 
    13: "原地学狗爬一圈喊着旺旺", 14: "大声朗读：我是主人的丝袜无脑贱畜", 15: "后退到起跑点留着口水翻着白眼1分钟", 
    16: "捏揉奶子一分钟，前进 5 格", 17: "伸出舌头模仿狗叫 20 声", 18: "把丝袜蒙在头上直到完成下一个任务", 
    19: "身上还有衣服吗都脱了不要影响喷射狗精", 20: "暂停一回合用鸡巴蹭丝袜不许用手", 21: "自摸 1 分钟不许射，早泄废物自行缩减", 
    22: "扇自己乳头淫叫 20 下", 23: "大力捏疼奶子向主人求饶", 24: "脑子懵了吗再问一口臭袜子前进 2 格", 
    25: "用脸蹭主人的袜子，听从主人吩咐", 26: "屏住呼吸闻臭味 30 秒让丝袜彻底代替你的脑子", 27: "站起来单手敬礼说我是主人的忠实无脑贱畜", 
    28: "向主人磕头大声喊出我是主人的骚狗", 29: "回到白痴状态，后退 4 格", 30: "主人可以随意下达一个指令", 
    31: "舔舐主人的丝袜让主人的丝袜侵入你的身体四肢", 32: "模仿狗乞食的动作学狗叫10声", 33: "闻着丝袜离着被丝袜改造越来越近，前进 1 格", 
    34: "喊着主人自扇嘴巴 15 下", 35: "又变成了白痴状态，后退 5 格", 36: "叼着丝袜跪着爬（主人定时间）", 
    37: "把臭丝袜塞进嘴吸允汁液1 分钟", 38: "套着丝袜让气息改造你的鸡巴前进 3 格", 39: "淫荡扭曲：谢谢主人调教", 
    40: "又变白痴了，脑子液化了吧后退 3 格", 41: "撸着鸡巴扇10 个耳光", 42: "保持跪姿翻白眼伸舌头流口水2 分钟", 
    43: "距离终点一步之遥，恶堕吧把脑子扔掉听从主人的命令", 44: "终点：口里喊着我是主人的人骚狗射出来！彻底恶堕永远成为丝袜无脑贱畜！"
  };

 let myColor = -1, positions = [0, 0], currentPlayer = 0, roomRef = null, lastMsgId = "";
  const maxPos = 44, canvas = document.getElementById('board'), ctx = canvas.getContext('2d');

  function toggleBGM() {
    const bgm = document.getElementById("snd-bgm");
    const btn = document.getElementById("bgm-ctrl");
    if (bgm.paused) { bgm.play(); btn.innerText = "🎵 BGM: ON"; btn.style.color = "#00ffff"; } 
    else { bgm.pause(); btn.innerText = "🎵 BGM: OFF"; btn.style.color = "#ff0080"; }
  }

  function createRoom(){
    const id = Math.random().toString(36).substring(2,8).toUpperCase();
    myColor = 0;
    roomRef = db.ref("rooms/"+id);
    roomRef.set({ positions:[0,0], currentPlayer:0, lastMsg: {id: Date.now(), text: "调教开始"} });
    document.getElementById("currentIDLabel").innerText = id;
    enterGame();
  }

  function joinRoom(){
    const id = document.getElementById("joinID").value.trim().toUpperCase();
    if(!id) return;
    myColor = 1;
    roomRef = db.ref("rooms/"+id);
    document.getElementById("currentIDLabel").innerText = id;
    enterGame();
  }

  function enterGame(){
    document.getElementById("connPanel").classList.add("hidden");
    document.getElementById("gameArea").classList.remove("hidden");
    roomRef.on("value", (snap) => {
      const data = snap.val(); if(!data) return;
      positions = data.positions; currentPlayer = data.currentPlayer;
      if(data.lastMsg && data.lastMsg.id !== lastMsgId){
        const log = document.getElementById("log");
        const entry = document.createElement("div");
        entry.className = "mb-1 border-b border-pink-900/30 pb-1";
        entry.innerText = `> ${data.lastMsg.text}`;
        log.prepend(entry);
        lastMsgId = data.lastMsg.id;
      }
      const isMyTurn = (currentPlayer === myColor);
      document.getElementById("info").innerHTML = (currentPlayer===0?"【奴隶】":"【贱畜】") + (isMyTurn ? "<br><span class='text-yellow-300'>该你受罚了</span>" : "<br>等待中...");
      document.getElementById("rollBtn").disabled = !isMyTurn;
      drawBoard();
    });
  }

  function rollDice(){
    document.getElementById("snd-dice").play().catch(()=>{});
    const d = Math.floor(Math.random()*6)+1;
    positions[currentPlayer] += d;
    if(positions[currentPlayer] >= maxPos) positions[currentPlayer] = maxPos;
    
    // ✅ 修复：获取任务文字并同步更新 Log
    const taskText = tasks[positions[currentPlayer]] || "继续接受调教";
    const role = currentPlayer === 0 ? "【奴隶】" : "【贱畜】";
    const msg = `${role} 掷出 ${d} 点，到达第 ${positions[currentPlayer]} 格：${taskText}`;
    
    roomRef.update({ 
      positions, 
      currentPlayer: (currentPlayer===0?1:0),
      lastMsg: { id: Date.now(), text: msg }
    });
    
    // ✅ 修复：弹出任务窗文字显示
    document.getElementById("task-text").innerText = taskText;
    document.getElementById("task").classList.remove("hidden");
    document.getElementById("snd-task").play().catch(()=>{});
  }

  function closeTask(){ document.getElementById("task").classList.add("hidden"); }
  
  function drawBoard(){
    canvas.width = canvas.clientWidth; canvas.height = canvas.clientWidth;
    const cols = 7, size = canvas.width / cols;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<=maxPos; i++){
      let row = Math.floor(i / cols), col = i % cols;
      if(row % 2 !== 0) col = (cols - 1) - col;
      const x = col * size, y = (cols - 1 - row) * size;
      ctx.strokeStyle = "#333"; ctx.strokeRect(x, y, size, size);
      if(positions[0] === i) { ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(x+size/2-5, y+size/2, 10, 0, Math.PI*2); ctx.fill(); }
      if(positions[1] === i) { ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(x+size/2+5, y+size/2, 6, 0, Math.PI*2); ctx.fill(); }
    }
  }

  function resetGame(){ if(confirm("清空大脑重置调教？")) roomRef.update({positions:[0,0], currentPlayer:0, lastMsg: {id: Date.now(), text: "调教重置"}}); }
  window.addEventListener('resize', drawBoard);
</script>
</body>
</html>
