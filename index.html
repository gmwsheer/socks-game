<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>恶堕臭丝袜洗脑棋</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdn.tailwindcss.com"></script> 
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #0e000e; color: #bef264;
            font-family: 'Courier New', monospace;
            position: relative; overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/images/bg.jpg') no-repeat center center;
            background-size: cover; opacity: 0.35; z-index: -1;
        }

        /* BGM 按钮：随页面滚动 */
        .header-container { position: relative; padding-top: 50px; text-align: center; }
        #bgm-header { position: absolute; top: 10px; right: 15px; z-index: 50; }
        #bgm-ctrl {
            background: rgba(0, 0, 0, 0.8); border: 1px solid #ff0080;
            color: #ff0080; padding: 4px 8px; border-radius: 12px;
            font-size: 10px; cursor: pointer;
        }

        .neon-pink { text-shadow: 0 0 15px #ff0080, 0 0 30px #ff0080; }
        .glass-panel {
            background-color: rgba(0, 0, 0, 0.75) !important;
            border: 2px solid #db2777 !important;
            backdrop-filter: blur(8px); border-radius: 1.5rem;
            margin-bottom: 1rem; padding: 1rem;
        }

        /* ✅ 棋盘容器修复：确保 mask.gif 浮在最上层 */
        #board-container { 
            position: relative; width: 100%; max-width: 450px; aspect-ratio: 1/1; 
            margin: 0 auto; border: 4px solid #db2777; border-radius: 1.5rem;
            overflow: hidden; background: #000;
        }
        #board { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 10; 
        }
        #board-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* 强制读取 mask.gif 并放在 Canvas 之上 */
            background-image: url('assets/images/mask.gif') !important;
            background-size: cover;
            background-position: center;
            opacity: 0.4; /* 如果看不清，可以调高到 0.6 */
            pointer-events: none; /* 关键：点击会穿透这张图点到下面的棋盘 */
            z-index: 20; /* 必须比 Canvas 的 z-index 高 */
        }

        /* 底部按钮：严禁溢出 */
        .btn-group { display: flex; gap: 8px; width: 100%; margin-top: 10px; box-sizing: border-box; }
        .btn-main {
            flex: 2; background-color: #db2777; color: white;
            font-weight: 900; border-radius: 1rem; padding: 12px 0;
            font-size: 1.2rem; text-align: center; border: none;
        }
        .btn-sub {
            flex: 1; background-color: #27272a; color: #a1a1aa;
            border-radius: 1rem; padding: 12px 0; font-size: 0.8rem;
            text-align: center; border: none;
        }
        #log { height: 100px; overflow-y: auto; font-size: 11px; color: #f472b6; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto px-4">
        <div class="header-container">
            <div id="bgm-header">
                <div id="bgm-ctrl" onclick="toggleBGM()">🎵 BGM: OFF</div>
            </div>
            <h1 class="text-3xl font-black text-pink-600 neon-pink">恶堕臭丝袜洗脑棋</h1>
            <p class="text-pink-400 mt-1 italic text-xs">成为主人的丝袜狗</p>
        </div>

        <div id="connPanel" class="glass-panel mt-6">
            <button onclick="createRoom()" class="w-full py-4 bg-pink-600 text-white rounded-2xl text-xl font-black mb-4"> 创建房间（成为丝袜奴隶） </button>
            <input id="joinID" placeholder="输入房号进行调教" class="w-full bg-zinc-900 border-2 border-pink-500 p-3 rounded-xl text-white text-center mb-2 outline-none">
            <button onclick="joinRoom()" class="w-full py-4 bg-pink-500 text-black rounded-2xl text-xl font-black"> 加入（成为丝袜贱畜） </button>
        </div>

        <div id="gameArea" class="hidden">
            <div class="glass-panel text-center py-2">
                <span class="text-pink-300 text-xs">调教房号：</span>
                <span id="currentIDLabel" class="text-white font-bold"></span>
            </div>

            <div id="board-container">
                <canvas id="board"></canvas>
            </div>

            <div id="info" class="glass-panel text-center font-black text-lg py-3 mt-4"> 正在侵入你的大脑...</div>

            <div class="btn-group">
                <button onclick="rollDice()" id="rollBtn" class="btn-main active:scale-95 disabled:opacity-50">恶堕吧</button>
                <button onclick="resetGame()" class="btn-sub active:scale-95">清空大脑</button>
            </div>

            <div id="log" class="glass-panel mt-4"></div>
        </div>
    </div>

    <div id="task" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-6 text-center">
        <div class="bg-zinc-950 border-4 border-pink-600 p-8 rounded-[2rem] max-w-sm">
            <div id="task-text" class="text-lg text-white mb-6 font-bold"></div>
            <button onclick="closeTask()" class="w-full bg-pink-600 text-white py-3 rounded-xl font-black">遵命，主人</button>
        </div>
    </div>

    <audio id="snd-bgm" src="assets/audio/bgm.mp3" loop></audio>
    <audio id="snd-dice" src="assets/audio/dice.mp3"></audio>
    <audio id="snd-task" src="assets/audio/task.mp3"></audio>

<script>
    // Firebase配置保持不变
    const firebaseConfig = {
        apiKey: "AIzaSyCzuqADikKXCOKtQXoiVkGRjPiceY-HVDk",
        authDomain: "swsgfxq-game.firebaseapp.com",
        databaseURL: "https://swsgfxq-game-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "swsgfxq-game",
        storageBucket: "swsgfxq-game.firebasestorage.app",
        messagingSenderId: "591308485557",
        appId: "1:591308485557:web:045018427b5e90076f9ffc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  
  const tasks = {
    1: "双膝跪地，向丝袜主人磕头", 2:"向主人磕头自抽耳光 5 下", 3: "抚摸敏感区深呼吸丝袜味道 30 秒让味道侵入你的大脑", 
    4: "原地转圈 10 次并叫：我是丝袜贱狗", 5: "用舌头清理丝袜上的褶皱", 6: "后退 2 格并将鼻勾和口撑戴上（5分钟后可选择摘下）",
    7: "双手比耶喊我是贱狗，前进 3 格", 8: "保持跪姿翻白眼伸舌头直到下一回合", 9: "捏着乳头亲吻丝袜 10 次让丝袜代替你思考", 
    10: "主人踩在脸上 1 分钟喊我是主人得臭鞋垫", 11: "左右手扇自己 10 下", 12: "闻一分钟臭丝袜让气息包裹着你的脑子", 
    13: "原地学狗爬一圈喊着旺旺", 14: "大声朗读：我是主人的丝袜无脑贱畜", 15: "后退到起跑点留着口水翻着白眼1分钟", 
    16: "捏揉奶子一分钟，前进 5 格", 17: "伸出舌头模仿狗叫 20 声", 18: "把丝袜蒙在头上直到完成下一个任务", 
    19: "身上还有衣服吗都脱了不要影响喷射狗精", 20: "暂停一回合用鸡巴蹭丝袜不许用手", 21: "自摸 1 分钟不许射，早泄废物自行缩减", 
    22: "扇自己乳头淫叫 20 下", 23: "大力捏疼奶子向主人求饶", 24: "脑子懵了吗再问一口臭袜子前进 2 格", 
    25: "用脸蹭主人的袜子，听从主人吩咐", 26: "屏住呼吸闻臭味 30 秒让丝袜彻底代替你的脑子", 27: "站起来单手敬礼说我是主人的忠实无脑贱畜", 
    28: "向主人磕头大声喊出我是主人的骚狗", 29: "回到白痴状态，后退 4 格", 30: "主人可以随意下达一个指令", 
    31: "舔舐主人的丝袜让主人的丝袜侵入你的身体四肢", 32: "模仿狗乞食的动作学狗叫10声", 33: "闻着丝袜离着被丝袜改造越来越近，前进 1 格", 
    34: "喊着主人自扇嘴巴 15 下", 35: "又变成了白痴状态，后退 5 格", 36: "叼着丝袜跪着爬（主人定时间）", 
    37: "把臭丝袜塞进嘴吸允汁液1 分钟", 38: "套着丝袜让气息改造你的鸡巴前进 3 格", 39: "淫荡扭曲：谢谢主人调教", 
    40: "又变白痴了，脑子液化了吧后退 3 格", 41: "撸着鸡巴扇10 个耳光", 42: "保持跪姿翻白眼伸舌头流口水2 分钟", 
    43: "距离终点一步之遥，恶堕吧把脑子扔掉听从主人的命令", 44: "终点：口里喊着我是主人的人骚狗射出来！彻底恶堕永远成为丝袜无脑贱畜！"
  };

    let myColor = -1, positions = [0, 0], currentPlayer = 0, roomRef = null, lastMsgId = "";
    const maxPos = 44, canvas = document.getElementById('board'), ctx = canvas.getContext('2d');

    function toggleBGM() {
        const bgm = document.getElementById("snd-bgm");
        const btn = document.getElementById("bgm-ctrl");
        if (bgm.paused) { bgm.play(); btn.innerText = "🎵 BGM: ON"; btn.style.color = "#00ffff"; } 
        else { bgm.pause(); btn.innerText = "🎵 BGM: OFF"; btn.style.color = "#ff0080"; }
    }

    function createRoom(){
        const id = Math.random().toString(36).substring(2,8).toUpperCase();
        myColor = 0; roomRef = db.ref("rooms/"+id);
        roomRef.set({ positions:[0,0], currentPlayer:0, lastMsg: {id: Date.now(), text: "调教开始"} });
        document.getElementById("currentIDLabel").innerText = id;
        enterUI();
    }

    function joinRoom(){
        const id = document.getElementById("joinID").value.trim().toUpperCase();
        if(!id) return;
        myColor = 1; roomRef = db.ref("rooms/"+id);
        document.getElementById("currentIDLabel").innerText = id;
        enterUI();
    }

    function enterUI(){
        document.getElementById("connPanel").classList.add("hidden");
        document.getElementById("gameArea").classList.remove("hidden");
        roomRef.on("value", (snap) => {
            const data = snap.val(); if(!data) return;
            positions = data.positions; currentPlayer = data.currentPlayer;
            if(data.lastMsg && data.lastMsg.id !== lastMsgId){
                const log = document.getElementById("log");
                const div = document.createElement("div");
                div.innerText = `> ${data.lastMsg.text}`;
                log.prepend(div);
                lastMsgId = data.lastMsg.id;
            }
            const isMyTurn = (currentPlayer === myColor);
      document.getElementById("info").innerHTML = (currentPlayer===0?"【奴隶】":"【贱畜】") + (isMyTurn ? "<br><span class='text-yellow-300'>该你了</span>" : "<br>恶堕中...");
      document.getElementById("rollBtn").disabled = !isMyTurn;
      drawBoard();
    });
  }

  function rollDice(){
    document.getElementById("snd-dice").play().catch(()=>{});
    const d = Math.floor(Math.random()*6)+1;
    let newPos = positions[currentPlayer] + d;
    if(newPos >= maxPos) newPos = maxPos;
    positions[currentPlayer] = newPos;
    const taskTxt = tasks[newPos] || "继续下沉";
    roomRef.update({ 
      positions, 
      currentPlayer: (currentPlayer===0?1:0),
      lastMsg: { id: Date.now(), text: `${currentPlayer===0?'【奴隶】':'【贱畜】'} 掷出 ${d} 点 -> ${taskTxt}` }
    });
    document.getElementById("task-text").innerText = taskTxt;
    document.getElementById("task").classList.remove("hidden");
    document.getElementById("snd-task").play().catch(()=>{});
  }

  function closeTask(){ document.getElementById("task").classList.add("hidden"); }
  
  function drawBoard(){
    canvas.width = canvas.clientWidth; canvas.height = canvas.clientWidth;
    const cols = 7, size = canvas.width / cols;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0; i<=maxPos; i++){
      let row = Math.floor(i / cols), col = i % cols;
      if(row % 2 !== 0) col = (cols - 1) - col;
      const x = col * size, y = (cols - 1 - row) * size;
      ctx.strokeStyle = "#444"; ctx.strokeRect(x, y, size, size);
      if(positions[0] === i) { ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(x+size/2-5, y+size/2, 10, 0, Math.PI*2); ctx.fill(); }
      if(positions[1] === i) { ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(x+size/2+5, y+size/2, 8, 0, Math.PI*2); ctx.fill(); }
    }
  }

  function resetGame(){ if(confirm("重清空大脑重置调教？")) roomRef.update({positions:[0,0], currentPlayer:0, lastMsg: {id: Date.now(), text: "调教重置"}}); }
  window.addEventListener('resize', drawBoard);
</script>
</body>
</html>
